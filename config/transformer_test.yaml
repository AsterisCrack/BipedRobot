train:
  seed: 42
  steps: 100000
  max_episode_steps: 1000
  worker_groups: 4
  workers_per_group: 8
  sim_frequency: 100
  use_history: True
  history_size: 10
  actor_obs: normal
  critic_obs: privileged
  log_dir: runs_transformer
  checkpoint_path: checkpoints_transformer/
  model_name: transformer_run
  overwrite_model: True

  model: sac

  test_environment: True
  epoch_steps: 5000
  save_steps: 10000

  test_episodes: 5
  show_progress: True
  replace_checkpoint: True
  log: True

  env_config:
    objective: walk
    enable_mirroring: False
    reward_weights:
      velocity: 0.5
      height: 10.0
      torso_centering: 2.0
      action_smoothness: 0.01

model:
  actor_config:
    network_type: transformer
    d_model: 128
    nhead: 4
    num_layers: 2
    dim_feedforward: 512
    
  critic_config:
    network_type: transformer
    d_model: 128
    nhead: 4
    num_layers: 2
    dim_feedforward: 512
  
  target_coeff: 0.005
  actor_lr: 1e-4
  critic_lr: 1e-4
  lr_scheduler:
    T_max: 1e6
    eta_min: 1e-6

buffer:
  size: 1e6
  return_steps: 5
  batch_iterations: 50
  batch_size: 1024
  discount_factor: 0.99
  steps_before_batches: 1e4
  steps_between_batches: 50
  seed: 42

randomization:
  randomize_dynamics: False
  randomize_sensors: False
  randomize_perturbations: False
