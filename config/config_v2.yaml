train:
  seed: 42
  steps: 500000
  worker_groups: 1
  workers_per_group: 1
  use_history: False
  history_size: 0
  normalize_obs: False
  symmetry_augmentation: True
  actor_obs: "normal"
  critic_obs: "normal"
  use_rough_terrain: false
  log_dir: "runs"
  checkpoint_path: "checkpoints/"
  # model_name: "complete_model"
  overwrite_model: true
  model: "ppo" # Options: sac, ddpg, d4pg, mpo
  
  test_environment: False
  epoch_steps: 1000
  save_steps: 3000
  test_episodes: 2
  show_progress: true
  replace_checkpoint: true

  env_config:
    reward_scale: 0.3
    # Rewards
    reward_weights:
      track_lin_vel_xy_exp: 2.0
      track_ang_vel_z_exp: 1.0
      termination_penalty: -10.0
      lin_vel_z_l2: -0.1
      ang_vel_xy_l2: -0.05
      flat_orientation_l2: -2.0
      action_rate_l2: -0.0005
      dof_torques_l2: -0.0005
      dof_acc_l2: -0.000001
      dof_pos_limits: -1.0
      feet_air_time: 1.0
      feet_slide: -0.5
      undesired_contacts: -1.0
      joint_deviation_hip: -0.2
      joint_deviation_ankle_roll: -0.2
      step_length: 10.0
      # swing_foot_height: 1.0
      torso_centering: 0.1
      
    # Commands
    commands:
      base_velocity:
        resampling_time_range: [10.0, 10.0]
        heading_control_stiffness: 0.3
        rel_standing_envs: 0.02
        rel_heading_envs: 1.0
        ranges:
          lin_vel_x: [-0.2, 0.3]
          lin_vel_y: [-0.2, 0.2]
          ang_vel_z: [-0.1, 0.1]
          heading: [-3.14159, 3.14159]

    # Noise
    observation_noise_model:
      mean: 0.0
      std: 0.01
    action_noise_model:
      mean: 0.0
      std: 0.00

model:
  # Network configuration
  actor_config:
    network_type: mlp # Options: mlp, cnn, lstm, transformer
    # d_model: 128
    # nhead: 4
    # num_layers: 2
    # dim_feedforward: 256
    # hidden_sizes: [512,256,128]
    hidden_sizes: [256, 128,128]
    
  critic_config:
    network_type: mlp # Options: mlp, cnn, lstm, transformer
    # d_model: 128
    # nhead: 4
    # num_layers: 2
    # dim_feedforward: 256
    # hidden_sizes: [512,256,128]
    hidden_sizes: [256, 128,128]

  # Training params
  target_coeff: 0.005
  actor_lr: 1e-3
  critic_lr: 1e-3
  lr_scheduler:
    scheduler_type: "none" # Options: cosine, plateau, none
    # Cosine args
    T_max: 5e5
    eta_min: 1.0e-5
    # Plateau args
    mode: "min"
    factor: 0.5
    patience: 2000
    threshold: 1e-4
    threshold_mode: "rel"
    cooldown: 0
    min_lr: 1e-6
    eps: 1e-8
    start_step: 15000000

ppo:
  # PPO Hyperparameters
  
  # clip_param: The "epsilon" in PPO's clipped surrogate objective. 
  # It limits how much the policy can change in a single update. 
  # Typical values: 0.1 to 0.3. Smaller values (0.1) are more stable, larger (0.3) learn faster but can be unstable.
  clip_param: 0.2
  
  # ppo_epoch: Number of times to iterate over the collected data (buffer) per update.
  # More epochs = more sample efficiency but higher risk of overfitting to the current batch.
  # Typical values: 3 to 10.
  ppo_epoch: 5
  
  # num_mini_batches: Number of mini-batches to split the buffer into for each epoch.
  # Smaller mini-batches = more noisy updates (stochastic gradient descent).
  # Larger mini-batches = more stable updates.
  # Total batch size = num_envs * num_steps. Mini-batch size = Total / num_mini_batches.
  num_mini_batches: 4
  
  # value_loss_coef: Weight of the value function loss in the total loss.
  # Balances policy learning vs value estimation.
  # Typical values: 0.5 to 1.0.
  value_loss_coef: 1.0
  
  # entropy_coef: Weight of the entropy bonus. Encourages exploration by penalizing certainty.
  # Higher values = more exploration. Lower values = faster convergence but risk of premature convergence.
  # Typical values: 0.0 to 0.01. Start high if agent gets stuck early.
  entropy_coef: 0.008
  
  # gamma: Discount factor for future rewards.
  # 0.99 is standard. Lower (0.90) for short-term tasks, Higher (0.999) for long-horizon tasks.
  gamma: 0.99
  
  # gae_lambda: Factor for Generalized Advantage Estimation (GAE).
  # Controls bias-variance tradeoff in advantage estimation.
  # Typical values: 0.9 to 0.99. 0.95 is a very strong default.
  gae_lambda: 0.95
  
  # max_grad_norm: Gradient clipping threshold. Prevents exploding gradients.
  # Typical values: 0.5 to 1.0.
  max_grad_norm: 1.0
  
  # num_steps: The number of steps to run in EACH environment before performing an update.
  # CRITICAL FOR ISAAC LAB: 
  # Total Batch Size = num_envs * num_steps.
  # With num_envs=4000, keep num_steps LOW (e.g., 24, 48, 96).
  # 2048 is for single-env or low-parallelism (CPU) training.
  # 24 steps * 4000 envs = 96,000 samples per update.
  num_steps: 24

exploration:
  scale: 0.3
  min_scale: 0.03
  decay_rate: 5.0e-8
  start_steps: 4096 # Should match buffer.steps_before_batches if possible

