train:
  seed: 42
  steps: 50000
  max_episode_steps: 1000
  worker_groups: 4
  workers_per_group: 8
  sim_frequency: 100
  use_history: True
  history_size: 5
  actor_obs: normal
  critic_obs: privileged
  log_dir: runs_test
  checkpoint_path: checkpoints_test/
  model_name: test_run
  overwrite_model: True

  model: sac

  test_environment: True
  epoch_steps: 2000
  save_steps: 10000

  test_episodes: 3
  show_progress: True
  replace_checkpoint: True
  log: True

  env_config:
    objective: target
    enable_mirroring: False
    reward_weights:
      velocity: 0.5
      height: 10.0
      torso_centering: 2.0
      action_smoothness: 0.01

model:
  actor_config:
    network_type: lstm
    hidden_size: 128
    num_layers: 2
    
  critic_config:
    network_type: mlp
    hidden_sizes: [256, 256]
  
  target_coeff: 0.005
  actor_lr: 3e-4
  critic_lr: 3e-4
  lr_scheduler:
    T_max: 1e6
    eta_min: 1e-6

buffer:
  size: 5e5
  return_steps: 3
  batch_iterations: 10
  batch_size: 512
  discount_factor: 0.99
  steps_before_batches: 5000
  steps_between_batches: 20
  seed: 42

randomization:
  randomize_dynamics: True
  randomize_sensors: True
  randomize_perturbations: False
  
  friction: [0.7, 1.3]
  joint_damping: [0.5, 2.0]
  mass: [0.8, 1.2]
  inertia: [0.8, 1.2]
  imu_noise: 0.005
  vel_noise: 0.01
