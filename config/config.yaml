train:
  seed: 42
  steps: 500000
  worker_groups: 1
  workers_per_group: 1
  use_history: True
  history_size: 5
  normalize_obs: True
  symmetry_augmentation: True
  actor_obs: "normal"
  critic_obs: "privileged"
  use_rough_terrain: false
  log_dir: "runs"
  checkpoint_path: "checkpoints/"
  model_name: "BipedV2_SAC"
  overwrite_model: true
  model: "sac"

  test_environment: False
  epoch_steps: 1000
  save_steps: 3000
  test_episodes: 2
  show_progress: true
  replace_checkpoint: true

  env_config:
    reward_scale: 1.0
    reward_weights:
      # Primary locomotion
      track_lin_vel_xy_exp: 2.0
      track_ang_vel_z_exp: 0.5

      # Stability
      termination_penalty: -5.0
      flat_orientation_l2: -1.5        # Stronger: penalize excessive forward lean
      lin_vel_z_l2: -0.1
      ang_vel_xy_l2: -0.15             # Stronger: dampen pitch/roll oscillations

      # Smoothness — restored to mild values (was too strong at -0.005)
      action_rate_l2: -0.001           # Mild: don't penalize exploratory motion
      dof_torques_l2: -0.0001

      dof_pos_limits: -1.0

      # Gait shaping
      feet_air_time: 0.5               # Primary stepping signal
      swing_foot_height: 0.0          # Reduced: discourage exaggerated high steps
      feet_slide: -0.3
      step_length: 0.0                # Reduced: prevent reward-hacked long strides
      knee_bend_touchdown: 0.0

      # Contact
      undesired_contacts: -0.5
      joint_deviation_hip: 0.0         # Disabled: hip_pitch is in this group for V2 and is REQUIRED for walking
      joint_deviation_ankle_roll: -0.05
      torso_centering: 0.05
      ankle_torques_l2: -0.0015        # penalise ankle pitch torque → discourages toe-only stance

      # Reference tracking (no motion reference loaded)
      track_joint_pos_exp: 0.0
      track_joint_vel_exp: 0.0

    commands:
      base_velocity:
        resampling_time_range: [8.0, 12.0]
        heading_control_stiffness: 0.5
        rel_standing_envs: 0.02
        rel_heading_envs: 1.0
        ranges:
          lin_vel_x: [-0.3, 0.5]       # Include backward motion
          lin_vel_y: [-0.3, 0.3]       # Full lateral range
          ang_vel_z: [-0.3, 0.3]
          heading: [-3.14159, 3.14159]

    observation_noise_model:
      mean: 0.0
      std: 0.01
    action_noise_model:
      mean: 0.0
      std: 0.00

    # Curriculum — only randomize_com and randomize_payload are scaled; all other DR runs at full strength
    curriculum_enabled: false
    curriculum_dr_start_steps: 20000    # 2M steps of clean training before COM/payload DR begins
    curriculum_dr_full_steps:  40000   # COM/payload DR reaches 100% at 10M steps
    curriculum_cmd_ramp_steps:  0         # full command range from the start
    curriculum_init_ramp_steps: 0         # full init range from the start
    curriculum_dr_events: ["randomize_com", "randomize_payload"]

model:
  actor_config:
    network_type: mlp
    hidden_sizes: [1024, 512, 256]
  critic_config:
    network_type: mlp
    hidden_sizes: [1024, 512, 256]

  target_coeff: 0.005
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  lr_scheduler:
    scheduler_type: "none"

exploration:
  scale: 0.3
  min_scale: 0.05
  decay_rate: 1.0e-7
  start_steps: 4096
  # Note: SAC temperature (alpha) is now auto-tuned via Lagrangian optimization.
  # The exploration noise above controls the initial random action phase only.

buffer:
  size: 1000000
  return_steps: 5
  batch_iterations: 10
  batch_size: 2048
  discount_factor: 0.99
  steps_before_batches: 4096
  steps_between_batches: 4
  seed: 42
