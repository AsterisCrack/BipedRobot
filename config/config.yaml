train:
  seed: 42
  steps: 500000
  worker_groups: 1
  workers_per_group: 1
  use_history: True
  history_size: 5
  normalize_obs: True
  symmetry_augmentation: True
  actor_obs: "normal"
  critic_obs: "privileged"
  use_rough_terrain: true
  use_terrain_curriculum: false  # terrain is domain randomization, not a progressive curriculum
  log_dir: "runs"
  checkpoint_path: "checkpoints/"
  model_name: "BipedV2_SAC"
  overwrite_model: true
  model: "sac"

  test_environment: False
  epoch_steps: 1000
  save_steps: 3000
  test_episodes: 2
  show_progress: true
  replace_checkpoint: true

  env_config:
    reward_scale: 1.0
    reward_weights:
      # Primary locomotion
      track_lin_vel_xy_exp: 2.0
      track_ang_vel_z_exp: 0.8          # was 0.5 — stronger yaw tracking for symmetric turns

      # Stability
      termination_penalty: -5.0
      flat_orientation_l2: -2.0         # was -1.5 — stronger tilt penalty
      lin_vel_z_l2: -2
      ang_vel_xy_l2: -0.05             # was -0.15 — damp pitch/roll oscillation (flowy body)

      # Smoothness
      action_rate_l2: -0.15    # restored — posture-correction escape barrier now solved; jitter costs essentially nothing at -0.02
      dof_torques_l2: -0.001   # was -0.0001 — 10× to penalise oscillatory PD torques

      dof_pos_limits: -1.0

      # Gait shaping — keep only symmetry/alternation signals, remove energy-encouraging terms
      gait_phase_contact: 0 #1.5          # primary alternation enforcer
      feet_air_time: 0.05               # removed — was encouraging big hops; gait_phase_contact handles timing
      swing_foot_height: 0.15           # removed — was encouraging unnecessary foot lifting
      feet_slide: -0.3                 # flat foot contact (keep)
      step_length: 0.0
      knee_bend_touchdown: 0.0

      # Contact & joint quality
      undesired_contacts: -0.5
      joint_deviation_hip: -0.15
      joint_deviation_hip_pitch: -0.08   # was -0.05 — slight increase for lean prevention
      joint_deviation_ankle_roll: -0.05
      joint_deviation_ankle_pitch: -0.5
      joint_deviation_knee: -0.15        # was -0.05 — was too weak vs other gradients
      torso_centering: 0.0
      com_support_centering: 0.1
      ankle_torques_l2: -0.003
      # dof_pos_l2: correct all-joint pose regulariser (was -0.2; increased now escape-barrier removed)
      dof_pos_l2: -0.5
      # base_height_l2: penalise crouching (<0.29m) and tiptoe (>0.29m)
      base_height_l2: 0 #-5.0
      # foot_separation: V2 natural spacing is only 4.3 cm; require 7 cm minimum
      foot_separation: -3.0
      # action_l2 DISABLED: action=0 maps to tiptoe+crouch+lean due to asymmetric joint limits
      action_l2: 0.0

      # Reference tracking (no motion reference loaded)
      track_joint_pos_exp: 0.0
      track_joint_vel_exp: 0.0

    commands:
      base_velocity:
        resampling_time_range: [8.0, 12.0]
        heading_control_stiffness: 0.5
        rel_standing_envs: 0.02
        rel_heading_envs: 1.0
        ranges:
          lin_vel_x: [-0.3, 0.5]       # Include backward motion
          lin_vel_y: [-0.3, 0.3]       # Full lateral range
          ang_vel_z: [-0.3, 0.3]
          heading: [-3.14159, 3.14159]

    observation_noise_model:
      mean: 0.0
      std: 0.05    # raised from 0.01 — better matches MPU-6050 noise floor (~0.3 m/s² accel, ~0.02 rad/s gyro)
    action_noise_model:
      mean: 0.0
      std: 0.01

    # Action delay: models servo comm latency (1–3 control steps @ 50 Hz = 20–60 ms)
    action_delay_steps_range: [1, 3]

    # Curriculum — randomize_com and randomize_payload scale from 0→100% over dr_full_steps
    curriculum_enabled: true
    curriculum_dr_start_steps: 0        # start DR from step 0
    curriculum_dr_full_steps:  40000    # reach full COM/payload DR at 40k steps
    curriculum_cmd_ramp_steps:  0       # full command range from the start
    curriculum_init_ramp_steps: 0       # full init range from the start
    curriculum_dr_events: ["randomize_com", "randomize_payload"]

model:
  actor_config:
    network_type: mlp
    hidden_sizes: [1024, 512, 256]
  critic_config:
    network_type: mlp
    hidden_sizes: [1024, 512, 256]

  target_coeff: 0.01
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  lr_scheduler:
    scheduler_type: "none"

exploration:
  scale: 0.3
  min_scale: 0.05
  decay_rate: 1.0e-7
  start_steps: 4096
  # Note: SAC temperature (alpha) is now auto-tuned via Lagrangian optimization.
  # The exploration noise above controls the initial random action phase only.

buffer:
  size: 1000000
  return_steps: 5 #1
  batch_iterations: 10 #4
  batch_size: 2048
  discount_factor: 0.99
  steps_before_batches: 4096
  steps_between_batches: 4
  seed: 42
