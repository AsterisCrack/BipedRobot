train:
  seed: 42
  steps: 500000
  max_episode_steps: 2000
  worker_groups: 1
  workers_per_group: 1
  sim_frequency: 100
  use_history: True
  history_size: 10
  normalize_obs: True
  symmetry_augmentation: True
  actor_obs: "normal"
  critic_obs: "normal"
  log_dir: "runs"
  checkpoint_path: "checkpoints/"
  # model_name: "complete_model"
  overwrite_model: true
  model: "d4pg" # Options: sac, ddpg, d4pg, mpo
  
  test_environment: False
  epoch_steps: 1000
  save_steps: 3000
  test_episodes: 2
  show_progress: true
  replace_checkpoint: true

  env_config:
    objective: "target" # Options: walk, target, balance
    reward_scale: 1.0
    # Rewards
    reward_weights:
      track_lin_vel_xy_exp: 1.0
      track_ang_vel_z_exp: 0.5
      lin_vel_z_l2: -2.0
      ang_vel_xy_l2: -0.05
      joint_torques_l2: -0.00001
      action_rate_l2: -0.01
      feet_air_time: 2.0
      feet_slide: -0.25
      undesired_contacts: -1.0
      joint_deviation_hip: -0.1
      joint_deviation_knee: -0.1
      flat_orientation_l2: -0.5
      dof_pos_limits: -1.0
      survived: 0.0
      
    # Commands
    commands:
      base_velocity:
        ranges:
          lin_vel_x: [-0.2, 0.4]
          lin_vel_y: [-0.2, 0.2]
          ang_vel_z: [-0.1, 0.1]

    # Randomization & Events
    enable_perturbations: False
    push_interval_s: 2.0
    push_vel_range: 2.0
    
    enable_physics_randomization: True
    events:
      reset_base:
        params:
          pose_range:
            x: [-0.5, 0.5]
            y: [-0.5, 0.5]
            yaw: [-3.14, 3.14]
          velocity_range:
            x: [-0.1, 0.1]
            y: [-0.1, 0.1]
            z: [-0.1, 0.1]
            roll: [-0.1, 0.1]
            pitch: [-0.1, 0.1]
            yaw: [-0.1, 0.1]
      reset_robot_joints:
        params:
          position_range: [-0.3, 0.3]
          velocity_range: [-0.3, 0.3]
      push_robot:
        interval_range_s: [20.0, 30.0]
        params:
          velocity_range:
            x: [-0.1, 0.1]
            y: [-0.1, 0.1]
      randomize_mass:
        params:
          mass_distribution_params: [-0.2, 0.2]
          operation: "add"
      randomize_friction:
        params:
          static_friction_range: [0.5, 1.5]
          dynamic_friction_range: [0.5, 1.5]
          restitution_range: [0.0, 0.0]
          num_buckets: 64

    # Noise
    observation_noise_model:
      mean: 0.0
      std: 0.01
    action_noise_model:
      mean: 0.0
      std: 0.00

model:
  # Network configuration
  actor_config:
    network_type: mlp # Options: mlp, cnn, lstm, transformer
    # d_model: 128
    # nhead: 4
    # num_layers: 2
    # dim_feedforward: 256
    hidden_sizes: [1024,512,256]
    
  critic_config:
    network_type: mlp # Options: mlp, cnn, lstm, transformer
    # d_model: 128
    # nhead: 4
    # num_layers: 2
    # dim_feedforward: 256
    hidden_sizes: [1024,512,256]
    
  # Training params
  target_coeff: 0.005
  actor_lr: 1e-4
  critic_lr: 1e-4
  lr_scheduler:
    scheduler_type: "none" # Options: cosine, plateau, none
    # Cosine args
    T_max: 5e5
    eta_min: 1.0e-5
    # Plateau args
    mode: "min"
    factor: 0.5
    patience: 2000
    threshold: 1e-4
    threshold_mode: "rel"
    cooldown: 0
    min_lr: 1e-6
    eps: 1e-8
    start_step: 70000000

  exploration:
    scale: 0.3
    min_scale: 0.03
    decay_rate: 3.0e-7
    start_steps: 4096 # Should match buffer.steps_before_batches if possible

buffer:
  size: 1000000
  return_steps: 3
  batch_iterations: 10 # Match replay ratio of ~0.4 (100 updates / 256 transitions)
  batch_size: 2048
  discount_factor: 0.99
  steps_before_batches: 4096 # Start training after 1 step
  steps_between_batches: 4 # Update every step
  seed: 42
