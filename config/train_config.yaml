train:
  seed: 42
  steps: 20000
  max_episode_steps: 1000
  worker_groups: 8
  workers_per_group: 16
  sim_frequency: 100
  use_history: False
  history_size: 0
  actor_obs: normal
  critic_obs: privileged
  log_dir: runs_optimizers_tests
  checkpoint_path: checkpoints_optimizers_tests/
  model_name: sac
  overwrite_model: False

  model: sac

  test_environment: False
  epoch_steps: 5e3
  save_steps: 5e4

  test_episodes: 5
  show_progress: False
  replace_checkpoint: False
  log: True

model:
# Old style network configuration
  actor_sizes: [256, 256]
  critic_sizes: [256, 256]
  
  # New modular network configuration (optional)
  # actor_config:
  #   network_type: "mlp"
  #   hidden_sizes: [256, 256]
  # critic_config:
  #   network_type: "lstm"
  #   hidden_size: 128
  #   num_layers: 2
  
  target_coeff: 0.005
  actor_lr: 1e-4
  critic_lr: 1e-4
  lr_scheduler:
    T_max: 5e5
    eta_min: 1e-5

buffer:
  size: 1e6
  return_steps: 5
  batch_iterations: 50
  batch_size: 1024
  discount_factor: 0.99
  steps_before_batches: 1e4
  steps_between_batches: 50
  seed: 42
