train:
  seed: 42
  steps: 100000
  max_episode_steps: 1000
  worker_groups: 4
  workers_per_group: 8
  sim_frequency: 100
  use_history: True
  history_size: 5
  actor_obs: normal
  critic_obs: privileged
  log_dir: runs_transformer
  checkpoint_path: checkpoints_transformer/
  model_name: transformer_run
  overwrite_model: True

  model: sac

  test_environment: True
  epoch_steps: 5000
  save_steps: 10000

  test_episodes: 5
  show_progress: True
  replace_checkpoint: True
  log: True

  env_config:
    objective: target
    enable_mirroring: False

model:
  actor_config:
    network_type: mlp
    hidden_sizes: [256, 256]
    
  critic_config:
    network_type: mlp
    hidden_sizes: [256, 256]
  
  target_coeff: 0.005
  actor_lr: 1e-3
  critic_lr: 1e-3
  lr_scheduler:
    T_max: 5e5
    eta_min: 1e-5

buffer:
  size: 1e6
  return_steps: 5
  batch_iterations: 50
  batch_size: 1024
  discount_factor: 0.99
  steps_before_batches: 1e4
  steps_between_batches: 50
  seed: 42

randomization:
  randomize_dynamics: False
  randomize_sensors: False
  randomize_perturbations: False
